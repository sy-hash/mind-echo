name: Test

on:
  push:
    branches: [develop]
    paths:
      - 'MindEcho/**'
      - 'Packages/**'
      - 'MindEcho.xcworkspace/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'MindEcho/**'
      - 'Packages/**'
      - 'MindEcho.xcworkspace/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DESTINATION: 'platform=iOS Simulator,name=iPhone 17'
  WORKSPACE: MindEcho.xcworkspace

jobs:
  build:
    name: Build
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData

      - name: Upload Build Products
        uses: actions/upload-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products
          retention-days: 1

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download Build Products
        uses: actions/download-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products

      - name: Run Unit Tests (MindEchoTests)
        run: |
          xcodebuild test-without-building \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -only-testing:MindEchoTests

  ui-tests:
    name: UI Tests
    needs: build
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download Build Products
        uses: actions/download-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products

      - name: Run UI Tests (MindEchoUITests)
        run: |
          xcodebuild test-without-building \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -only-testing:MindEchoUITests
