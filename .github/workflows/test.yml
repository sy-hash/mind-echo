name: Test

on:
  push:
    branches: [develop]
    paths:
      - 'MindEcho/**'
      - 'Packages/**'
      - 'MindEcho.xcworkspace/**'
      - 'scripts/select-ios-simulator.sh'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'MindEcho/**'
      - 'Packages/**'
      - 'MindEcho.xcworkspace/**'
      - 'scripts/select-ios-simulator.sh'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKSPACE: MindEcho.xcworkspace

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Run swift-format lint
        run: |
          swift-format lint \
            --recursive \
            --strict \
            MindEcho/MindEcho \
            Packages/

  build:
    name: Build
    needs: lint
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Resolve iPhone simulator destination
        run: |
          DESTINATION="$(bash scripts/select-ios-simulator.sh)"
          echo "DESTINATION=$DESTINATION" >> "$GITHUB_ENV"
          echo "Using destination: $DESTINATION"

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData

      - name: Upload Build Products
        uses: actions/upload-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products
          retention-days: 1

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Resolve iPhone simulator destination
        run: |
          DESTINATION="$(bash scripts/select-ios-simulator.sh)"
          echo "DESTINATION=$DESTINATION" >> "$GITHUB_ENV"
          echo "Using destination: $DESTINATION"

      - name: Download Build Products
        uses: actions/download-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products

      - name: Run Unit Tests (MindEchoTests)
        run: |
          xcodebuild test-without-building \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -only-testing:MindEchoTests

  ui-tests:
    name: UI Tests
    needs: build
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Resolve iPhone simulator destination
        run: |
          DESTINATION="$(bash scripts/select-ios-simulator.sh)"
          echo "DESTINATION=$DESTINATION" >> "$GITHUB_ENV"
          echo "Using destination: $DESTINATION"

      - name: Download Build Products
        uses: actions/download-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products

      - name: Run UI Tests (MindEchoUITests)
        run: |
          xcodebuild test-without-building \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -only-testing:MindEchoUITests
