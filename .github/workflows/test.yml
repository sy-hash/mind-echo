name: Test

on:
  push:
    branches: [develop]
    paths:
      - 'MindEcho/**'
      - 'Packages/**'
      - 'MindEcho.xcworkspace/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'MindEcho/**'
      - 'Packages/**'
      - 'MindEcho.xcworkspace/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DESTINATION: 'platform=iOS Simulator,name=iPhone 17'
  WORKSPACE: MindEcho.xcworkspace

jobs:
  build:
    name: Build
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Build for Testing
        run: |
          xcodebuild build-for-testing \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData

      - name: Upload Build Products
        uses: actions/upload-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products
          retention-days: 1

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download Build Products
        uses: actions/download-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products

      - name: Run Unit Tests (MindEchoTests)
        run: |
          mkdir -p TestResults
          xcodebuild test-without-building \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -only-testing:MindEchoTests \
            -resultBundlePath TestResults/UnitTests.xcresult

      - name: Extract test results on failure
        if: failure()
        run: |
          xcrun xcresulttool get test-results tests \
            --path TestResults/UnitTests.xcresult \
            > TestResults/unit-test-results.json 2>/dev/null || true

          xcrun xcresulttool get test-results summary \
            --path TestResults/UnitTests.xcresult \
            > TestResults/unit-test-summary.json 2>/dev/null || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/
          retention-days: 7

  ui-tests:
    name: UI Tests
    needs: build
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Download Build Products
        uses: actions/download-artifact@v4
        with:
          name: build-products
          path: DerivedData/Build/Products

      - name: Run UI Tests (MindEchoUITests)
        run: |
          mkdir -p TestResults
          xcodebuild test-without-building \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -derivedDataPath DerivedData \
            -only-testing:MindEchoUITests \
            -resultBundlePath TestResults/UITests.xcresult

      - name: Extract test results on failure
        if: failure()
        run: |
          xcrun xcresulttool get test-results tests \
            --path TestResults/UITests.xcresult \
            > TestResults/ui-test-results.json 2>/dev/null || true

          xcrun xcresulttool get test-results summary \
            --path TestResults/UITests.xcresult \
            > TestResults/ui-test-summary.json 2>/dev/null || true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: TestResults/
          retention-days: 7
