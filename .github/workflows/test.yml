name: Test

on:
  push:
    branches: [develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DESTINATION: 'platform=iOS Simulator,name=iPhone 17'
  WORKSPACE: MindEcho.xcworkspace

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Run Unit Tests (MindEchoTests)
        run: |
          xcodebuild test \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -only-testing:MindEchoTests

  ui-tests:
    name: UI Tests
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Run UI Tests (MindEchoUITests)
        run: |
          xcodebuild test \
            -workspace $WORKSPACE \
            -scheme MindEcho \
            -destination "$DESTINATION" \
            -only-testing:MindEchoUITests
